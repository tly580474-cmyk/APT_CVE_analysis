
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE数据可视化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
        }
        .card {
            margin-bottom: 20px;
        }
        .chart-container {
            width: 100%;
            height: 400px;
        }
        .stats-card {
            text-align: center;
        }
        .stats-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center my-4">CVE数据可视化工具</h1>
        
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body stats-card">
                        <h5 class="card-title">总CVE数量</h5>
                        <div class="number" id="total-cves">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body stats-card">
                        <h5 class="card-title">年份覆盖</h5>
                        <div class="number" id="years-covered">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body stats-card">
                        <h5 class="card-title">有GitHub POC</h5>
                        <div class="number" id="with-poc">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body stats-card">
                        <h5 class="card-title">无GitHub POC</h5>
                        <div class="number" id="without-poc">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">每年CVE数量趋势</h5>
            </div>
            <div class="card-body">
                <div id="year-chart" class="chart-container"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">漏洞类型分布</h5>
            </div>
            <div class="card-body">
                <div id="vulnerability-chart" class="chart-container"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">产品分布</h5>
            </div>
            <div class="card-body">
                <div id="product-chart" class="chart-container"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">POC可用性分布</h5>
            </div>
            <div class="card-body">
                <div id="poc-chart" class="chart-container"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">绵羊榜 - 漏洞最多的前十大产品</h5>
            </div>
            <div class="card-body">
                <div id="sheep-chart" class="chart-container"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 加载数据
        fetch('/api/data')
            .then(response => response.json())
            .then(data => {
                // 更新统计信息
                document.getElementById('total-cves').textContent = data.total_cves;
                document.getElementById('years-covered').textContent = data.years.join(', ');
                document.getElementById('with-poc').textContent = data.poc_data.with_poc;
                document.getElementById('without-poc').textContent = data.poc_data.without_poc;
                
                // 每年CVE数量趋势
                const yearChart = echarts.init(document.getElementById('year-chart'));
                const yearOption = {
                    title: {
                        text: '每年CVE数量趋势',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis'
                    },
                    xAxis: {
                        type: 'category',
                        data: Object.keys(data.year_data)
                    },
                    yAxis: {
                        type: 'value'
                    },
                    series: [{
                        data: Object.values(data.year_data),
                        type: 'bar',
                        itemStyle: {
                            color: '#007bff'
                        }
                    }]
                };
                yearChart.setOption(yearOption);
                
                // 漏洞类型分布
                const vulnerabilityChart = echarts.init(document.getElementById('vulnerability-chart'));
                const vulnerabilityOption = {
                    title: {
                        text: '漏洞类型分布',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'value'
                    },
                    yAxis: {
                        type: 'category',
                        data: data.top_vulnerabilities.map(item => item.type),
                        axisLabel: {
                            interval: 0,
                            rotate: 30
                        }
                    },
                    series: [{
                        data: data.top_vulnerabilities.map(item => item.count),
                        type: 'bar',
                        itemStyle: {
                            color: '#28a745'
                        }
                    }]
                };
                vulnerabilityChart.setOption(vulnerabilityOption);
                
                // 产品分布
                const productChart = echarts.init(document.getElementById('product-chart'));
                const productOption = {
                    title: {
                        text: '产品分布',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'value'
                    },
                    yAxis: {
                        type: 'category',
                        data: data.top_products.map(item => item.name),
                        axisLabel: {
                            interval: 0,
                            rotate: 30
                        }
                    },
                    series: [{
                        data: data.top_products.map(item => item.count),
                        type: 'bar',
                        itemStyle: {
                            color: '#ffc107'
                        }
                    }]
                };
                productChart.setOption(productOption);
                
                // POC可用性分布
                const pocChart = echarts.init(document.getElementById('poc-chart'));
                const pocOption = {
                    title: {
                        text: 'POC可用性分布',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'item'
                    },
                    legend: {
                        orient: 'vertical',
                        left: 'left'
                    },
                    series: [{
                        name: 'POC可用性',
                        type: 'pie',
                        radius: '50%',
                        data: [
                            {value: data.poc_data.with_poc, name: '有GitHub POC'},
                            {value: data.poc_data.without_poc, name: '无GitHub POC'}
                        ],
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }]
                };
                pocChart.setOption(pocOption);
                
                // 绵羊榜 - 漏洞最多的前十大产品
                const sheepChart = echarts.init(document.getElementById('sheep-chart'));
                const sheepOption = {
                    title: {
                        text: '绵羊榜 - 漏洞最多的前十大产品',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'value'
                    },
                    yAxis: {
                        type: 'category',
                        data: data.sheep_list.map(item => item.name),
                        axisLabel: {
                            interval: 0,
                            rotate: 30
                        }
                    },
                    series: [{
                        data: data.sheep_list.map(item => item.count),
                        type: 'bar',
                        itemStyle: {
                            color: '#dc3545'
                        }
                    }]
                };
                sheepChart.setOption(sheepOption);
                
                // 响应式调整
                window.addEventListener('resize', function() {
                    yearChart.resize();
                    vulnerabilityChart.resize();
                    productChart.resize();
                    pocChart.resize();
                    sheepChart.resize();
                });
            })
            .catch(error => console.error('Error loading data:', error));
    </script>
</body>
</html>
